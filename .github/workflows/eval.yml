name: eval

on:
  push:
  pull_request:
  schedule:
    - cron: "0 7 * * *" # nightly LLM-judge evals

jobs:
  # Fast, deterministic gate — offline (replays recorded runs). Runs on every push/PR.
  deterministic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: go-task/setup-task@v1
      - run: task eval

  # LLM-as-a-judge evals — needs API keys, so only on the nightly schedule.
  # Configure OPENAI_API_KEY and TAVILY_API_KEY as repo secrets to enable.
  llm-judge:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: go-task/setup-task@v1
      - env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: task eval:llm
