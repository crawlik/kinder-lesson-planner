# Task runner for kinder-lesson-planner — https://taskfile.dev
# One blessed entry point per workflow. Run `task` (or `task --list`) to see all.
version: "3"

dotenv: [".env"]

vars:
  COMPOSE: docker compose -f observability/docker-compose.yaml
  DATASET: tests/datasets/lessons.jsonl

tasks:
  default:
    desc: List available tasks
    cmds: [task --list]
    silent: true

  setup:
    desc: Install all dependencies (incl. dev)
    cmds: [uv sync]
    sources: ["pyproject.toml", "uv.lock"]

  run:
    desc: Launch the colorful terminal app (auto-starts the observability stack)
    deps: [setup]
    cmds:
      # Bring up Tempo/Prometheus/Grafana so traces flow; non-fatal if Docker is
      # down — the app still runs and tracing simply no-ops.
      - cmd: "{{.COMPOSE}} up -d"
        ignore_error: true
      - uv run python main.py
    interactive: true

  web:
    desc: Run the web backend (FastAPI + SSE) locally at :8000
    cmds:
      - uv sync --extra web
      - cmd: "{{.COMPOSE}} up -d"
        ignore_error: true
      - .venv/bin/python -m uvicorn web.app:app --host 0.0.0.0 --port 8000
    interactive: true

  web:docker:
    desc: Build + run the web backend in Docker at :8000 (keys from .env)
    cmds:
      - docker build -f web/Dockerfile -t kinder-lesson-planner-web .
      - docker run --rm -p 8000:8000 --env-file .env -e TRACING_ENABLED=false --name kinder-web kinder-lesson-planner-web
    interactive: true

  demo:
    desc: Regenerate the README demo GIF — live capture (needs vhs, ttyd, and .env keys)
    deps: [setup]
    cmds: [vhs docs/demo.tape]

  # ---- Observability (local Grafana stack) ----
  obs:up:
    desc: Start Tempo + Prometheus + Grafana
    cmds:
      - "{{.COMPOSE}} up -d"
      - 'echo "Grafana → http://localhost:3000  (Explore → Tempo)"'

  obs:down:
    desc: Stop the observability stack
    cmds: ["{{.COMPOSE}} down"]

  obs:logs:
    desc: Tail the stack logs
    cmds: ["{{.COMPOSE}} logs -f"]

  # ---- Evaluation ----
  eval:
    desc: Deterministic eval gate (offline, fast — the PR gate)
    deps: [setup]
    cmds: ['uv run pytest -m "not llm"']

  eval:llm:
    desc: LLM-as-a-judge eval gate (needs API keys)
    deps: [setup]
    cmds: ["uv run pytest -m llm"]

  eval:all:
    desc: Run the full eval suite
    deps: [setup]
    cmds: [uv run pytest]

  # ---- Dataset curation (needs the stack up with fresh traces) ----
  dataset:export:
    desc: Curate the eval dataset from real Tempo traces
    cmds: ["uv run python scripts/export_traces.py > {{.DATASET}}"]

  dataset:record:
    desc: Record agent outputs so the deterministic gate runs offline
    cmds: [uv run python scripts/record_runs.py]

  dataset:
    desc: Rebuild the dataset (export from traces, then record runs)
    cmds:
      - task: dataset:export
      - task: dataset:record
